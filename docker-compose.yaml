services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: ./api_service
    ports:
      - "8000:8000"
    env_file: .env.dev
    depends_on:
      - postgres

  worker:
    build: ./worker
    command: celery -A tasks worker --loglevel=info
    env_file: .env.dev
    depends_on:
      - postgres
      - redis

  beat:
    build: ./worker
    command: celery -A tasks beat --loglevel=info
    env_file: .env.dev
    depends_on:
      - redis